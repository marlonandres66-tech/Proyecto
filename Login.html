<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Css/login.css">
</head>
<body>

    <div class="contenedor">
        <div class="formulario">
            <form class="inicio">
                <h2>Iniciar Sesión</h2>
                <div class="redes-sociales">
                    <ion-icon name="logo-google"></ion-icon>
                    <ion-icon name="logo-x"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                    <ion-icon name="logo-tiktok"></ion-icon>
                </div>
                <span>Use su correo y contraseña</span>
                <div class="input">
                    <ion-icon name="mail-open-outline"></ion-icon>
                    <input type="text" id="email" placeholder="Email">
                </div>
                <div class="input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" id="password" placeholder="Contraseña">
                </div>
                <a href="#">¿Olvidaste tu contraseña?</a>
                <button class="btn" id="iniciar">Iniciar Sesión</button>
            </form>
        </div>
        <div class="formulario">
            <form class="registro">
                <h2>Registrarse</h2>
                 <div class="redes-sociales">
                    <ion-icon name="logo-google"></ion-icon>
                    <ion-icon name="logo-x"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                    <ion-icon name="logo-tiktok"></ion-icon>
                </div>
                <span>Use su correo electrónico para registrarse</span>
                <div class="input">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" id="nombre" placeholder="Nombre">
                </div>
                <div class="input">
                    <ion-icon name="mail-open-outline"></ion-icon>
                    <input type="text" id="email-registro" placeholder="Email">
                </div>
                <div class="input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" id="password-registro" placeholder="Contraseña">
                </div>
                <button class="btn" id="regis">Registrarse</button>
            </form>
        </div>

        <div class="bienvenida">
            <div class="bienvenido-registro bienvenido">
                <h3>Bienvenido</h3>
                <p>Registrese con sus datos personales para acceder a todas las funciones</p>
                <button class="btn" id="registrarse">Registrarse</button>
            </div>
            <div class="bienvenido-inicio bienvenido">
                <h3>Hola</h3>
                <p>Inice sesión con su información personal para acceder a todas las funciones</p>
                <button class="btn" id="iniciar-sesion">Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <script src="js/proyecto.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>
</html>
