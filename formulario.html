<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Postulación</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
   <section class="postulacion">
    <h2>Formulario de Postulación</h2>
    <input class="control" type="text" id="nombre" placeholder="Ingresa tu nombre">
    <input class="control" type="text" id="apellido" placeholder="Ingresa tu apellido">
    <input class="control" type="number" id="cedula" placeholder="Ingresa tu número de identificación">
    <input class="control" type="number" id="celular" placeholder="Ingresa tu número de celular">
    <input class="control" type="email" id="email" placeholder="Ingresa tu correo electrónico">
    <p>Estoy de acuerdo con los<a href="#"> Términos y Condiciones</a></p>
    <button class="btn" id="enviarPs">Enviar Postulación</button>
   </section>
   <script src="formulario.js"></script>
</body>
</html>
